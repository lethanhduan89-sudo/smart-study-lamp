<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Smart Study Lamp AI</title>

  <style>
    body {
      font-family: Arial;
      background: #f0f2f5;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 600px;
      margin: auto;
      padding: 20px;
    }

    h2 {
      text-align: center;
    }

    #chat {
      background: white;
      height: 300px;
      overflow-y: auto;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .msg {
      margin: 5px 0;
      padding: 8px;
      border-radius: 8px;
    }

    .user {
      background: #d1e7dd;
      text-align: right;
    }

    .ai {
      background: #f8d7da;
      text-align: left;
    }

    input {
      width: 70%;
      padding: 10px;
    }

    button {
      padding: 10px;
      margin-top: 5px;
      cursor: pointer;
    }

    #status {
      margin-top: 10px;
      font-size: 14px;
      color: #333;
    }
  </style>
</head>

<body>
<div class="container">

  <h2>Đèn học thông minh AI</h2>

  <div id="chat"></div>

  <input id="textInput" placeholder="Nhập: bật đèn, tăng sáng..." />
  <button onclick="sendText()">Gửi</button>
  <br><br>

  <button onclick="startRec()">🎤 Thu âm</button>
  <button onclick="stopRec()">⏹ Dừng</button>

  <div id="status">Đang tải trạng thái...</div>

</div>

<script>
const BACKEND = "https://smart-study-lamp.onrender.com";

let mediaRecorder;
let chunks = [];

function addMsg(text, role) {
  const div = document.createElement("div");
  div.className = "msg " + role;
  div.textContent = text;
  document.getElementById("chat").appendChild(div);
  div.scrollIntoView({ behavior: "smooth" });
}

// ====================== TEXT ======================
async function sendText() {
  const input = document.getElementById("textInput");
  const text = input.value.trim();
  if (!text) return;

  addMsg("Bạn: " + text, "user");
  input.value = "";

  const res = await fetch(BACKEND + "/ask", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ text })
  });

  const data = await res.json();

  addMsg("AI: " + (data.reply || "Không có phản hồi"), "ai");

  if (data.audio_url) {
    const audio = new Audio(data.audio_url);
    audio.play();
  }

  refreshStatus();
}

// ====================== VOICE ======================
async function startRec() {
  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

  mediaRecorder = new MediaRecorder(stream);
  chunks = [];

  mediaRecorder.ondataavailable = e => chunks.push(e.data);
  mediaRecorder.start();

  addMsg("Bạn: [đang thu âm...]", "user");
}

async function stopRec() {
  if (!mediaRecorder) return;

  mediaRecorder.onstop = async () => {
    const blob = new Blob(chunks, { type: "audio/webm" });

    const formData = new FormData();
    formData.append("file", blob, "voice.webm");

    const res = await fetch(BACKEND + "/voice", {
      method: "POST",
      body: formData
    });

    const data = await res.json();

    if (data.heard_text) {
      addMsg("Bạn nói: " + data.heard_text, "user");
    }

    addMsg("AI: " + (data.reply || "Không có phản hồi"), "ai");

    if (data.audio_url) {
      const audio = new Audio(data.audio_url);
      audio.play();
    }

    refreshStatus();
  };

  mediaRecorder.stop();
}

// ====================== STATUS ======================
async function refreshStatus() {
  try {
    const res = await fetch(BACKEND + "/device/status");
    const s = await res.json();

    document.getElementById("status").textContent =
      `Độ sáng: ${s.brightness}% | Auto: ${s.auto_mode ? "Bật" : "Tắt"} | Lux: ${s.ambient_lux ?? "-"} | Khoảng cách: ${s.distance_cm ?? "-"} cm`;
  } catch (e) {
    document.getElementById("status").textContent = "Không lấy được trạng thái.";
  }
}

refreshStatus();
setInterval(refreshStatus, 5000);
</script>

</body>
</html>
